<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoatMosire — Hex Map Editor</title>
<link rel="stylesheet" href="css/editor.css">
</head>
<body>

<div class="toolbar" id="toolbar">
  <span style="font-weight:700;color:var(--accent)">⬡ GoatMosire</span>
  <select id="worldSelect" onchange="onWorldChange()"><option>loading...</option></select>
  <select id="nodeSelect" onchange="onNodeChange()" style="min-width:100px"><option>auto</option></select>

  <button id="btnPen" class="active" onclick="setTool('pen')" title="画笔">🖊</button>
  <button id="btnFill" onclick="setTool('fill')" title="填充">🪣</button>
  <button id="btnEraser" onclick="setTool('eraser')" title="擦除">🧹</button>
  <button id="btnPathway" onclick="setTool('pathway')" title="通路编辑 — 道路/河流">🛤️</button>
  <button id="btnProvince" onclick="setTool('province')" title="区域">📐</button>
  <button id="btnMapEdit" onclick="toggleMapEdit()" title="地图编辑 — 生成/扩充/压缩">🗺</button>

  <span style="color:var(--dim);margin:0 4px;">|</span>
  <span id="terrainButtons" style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;">
  </span>

  <span class="spacer"></span>
  <button onclick="saveMap()" title="保存 Ctrl+S">💾 保存</button>
  <button onclick="fitView()" title="适应画面 F">🔍 适应</button>
  <span class="status" id="statusBar">就绪</span>
</div>

<div style="display:flex;flex:1;overflow:hidden;">
<div class="left-panel" id="leftPanel">
  <h4 id="leftTitle">📍 地块详情</h4>
  <div id="leftBody"><div style="color:var(--dim);font-size:11px">点击地图上的地块查看详情</div></div>
</div>
<div class="canvas-wrap" id="canvasWrap" style="flex:1;">
  <canvas id="mapCanvas"></canvas>
  <div class="tooltip" id="tooltip"></div>
</div>
<div class="right-panel" id="rightPanel">
  <h4 id="rightTitle">📐 区域管理</h4>
  <div id="rightBody"></div>
</div>
<div class="right-panel map-edit-panel" id="mapEditPanel">
  <h4>🗺 地图编辑</h4>
  <div id="mapEditBody">
    <!-- 🎲 大陆生成 -->
    <div class="map-edit-section">
      <div class="me-header" onclick="toggleMeSection(this)">
        <span class="me-arrow">▼</span> 🎲 大陆生成参数
      </div>
      <div class="me-body" id="mapEditGen">
        <div class="row"><label>主山脉数</label><input type="range" id="genRidges" min="1" max="6" value="2" oninput="syncGenRange('genRidges')"><span class="val" id="genRidgesVal">2</span></div>
        <div class="row"><label>碎片数</label><input type="range" id="genFragments" min="1" max="15" value="5" oninput="syncGenRange('genFragments')"><span class="val" id="genFragmentsVal">5</span></div>
        <div class="row"><label>陆地率</label><input type="range" id="genLand" min="0.25" max="0.80" step="0.01" value="0.55" oninput="syncGenRange('genLand')"><span class="val" id="genLandVal">0.55</span></div>
        <div class="row"><label>粗糙度</label><input type="range" id="genRoughness" min="0.1" max="1.0" step="0.05" value="0.5" oninput="syncGenRange('genRoughness')"><span class="val" id="genRoughnessVal">0.5</span></div>
        <div class="row"><label>半径</label><input type="range" id="genRadius" min="40" max="200" step="10" value="120" oninput="syncGenRange('genRadius')"><span class="val" id="genRadiusVal">120</span></div>
        <div class="row"><label>种子</label><input type="number" id="genSeed" value="" placeholder="留空=随机" style="width:80px;flex:1"></div>
        <button class="gen-btn" onclick="generateWorld()">🎲 生成大陆</button>
      </div>
    </div>

    <!-- 🗺 地图扩充 -->
    <div class="map-edit-section">
      <div class="me-header" onclick="toggleMeSection(this)">
        <span class="me-arrow">▶</span> 🗺 地图扩充
      </div>
      <div class="me-body collapsed" id="mapEditExpand">
        <div class="expand-dirs" id="expandDirs"></div>
        <div class="row" style="margin-top:8px">
          <label>半径</label>
          <input type="number" id="expandRadius" value="0" min="0" max="200" style="width:60px" title="0=自动匹配当前半径">
          <span style="font-size:9px;color:var(--dim)">0=自动</span>
        </div>
        <button class="expand-go-btn" onclick="doExpand()" disabled id="expandGoBtn">扩充</button>
        <div id="expandInfo" style="font-size:9px;color:var(--dim);margin-top:4px">选择方向后点击扩充</div>
      </div>
    </div>

    <!-- 📐 区域压缩 -->
    <div class="map-edit-section">
      <div class="me-header" onclick="toggleMeSection(this)">
        <span class="me-arrow">▶</span> 📐 区域压缩
      </div>
      <div class="me-body collapsed" id="mapEditCompress">
        <div class="row">
          <label>最小区域</label>
          <input type="number" id="compressMinSize" value="100" min="10" max="1000" style="width:60px">
          <span style="font-size:9px;color:var(--dim)">hex</span>
        </div>
        <button class="compress-go-btn" onclick="doCompress()">压缩区域</button>
        <div id="compressInfo" style="font-size:9px;color:var(--dim);margin-top:4px"></div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- Latest texts — keep floating bottom-left -->
<div class="latest-panel" id="latestPanel">
  <h4 onclick="toggleLatestPanel()"><span><span id="latestArrow">▼</span> 📋 最新推文</span><button class="refresh-btn" onclick="event.stopPropagation();loadLatestTexts()" title="刷新">↻</button></h4>
  <div class="body" id="latestBody"><div style="color:var(--dim);font-size:10px;padding:4px">加载中...</div></div>
</div>

<script src="map-api.js"></script>
<script src="js/state.js"></script>
<script src="js/hex-math.js"></script>
<script src="js/terrain.js"></script>
<script src="js/tags.js"></script>
<script src="js/paint.js"></script>
<script src="js/render.js"></script>
<script src="js/river.js"></script>
<script src="js/pathway.js"></script>
<script src="js/province.js"></script>
<script src="js/generator.js"></script>
<script src="js/ui.js"></script>
<script src="js/events.js"></script>
<script src="js/expand.js"></script>

<script>init();</script>
</body>
</html>
