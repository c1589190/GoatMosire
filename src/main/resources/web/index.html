<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoatMosire — Hex Map Editor</title>
<style>
:root {
  --bg: #1a1a2e; --panel: #16213e; --accent: #e67e22;
  --text: #e0e0e0; --dim: #888; --border: #2a2a4a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Toolbar */
.toolbar {
  min-height: 48px; background: var(--panel); display: flex; align-items: center; flex-wrap: wrap;
  padding: 4px 12px; gap: 6px; border-bottom: 1px solid var(--border); z-index: 100;
}
.toolbar select, .toolbar button {
  background: var(--bg); color: var(--text); border: 1px solid var(--border);
  padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
}
.toolbar button:hover { background: var(--accent); color: #fff; }
.toolbar button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Terrain buttons */
.terrain-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 8px !important; font-size: 11px !important;
}
.terrain-btn .swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.3); flex-shrink: 0; }
.terrain-btn .label { line-height: 1; }

.toolbar .spacer { flex: 1; }
.toolbar .status { font-size: 11px; color: var(--dim); white-space: nowrap; }

/* Canvas */
.canvas-wrap { flex: 1; position: relative; overflow: hidden; background: #0f0f23; }
#mapCanvas { display: block; position: absolute; top: 0; left: 0; }

/* Tooltip */
.tooltip {
  position: absolute; pointer-events: none; background: rgba(0,0,0,0.85);
  color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 11px;
  display: none; z-index: 200; white-space: nowrap;
}

.goat-toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: #fff; padding: 8px 20px; border-radius: 8px;
  font-size: 13px; z-index: 9999; transition: opacity 0.3s;
}
</style>
</head>
<body>

<div class="toolbar" id="toolbar">
  <span style="font-weight:700;color:var(--accent)">⬡ GoatMosire</span>
  <select id="worldSelect" onchange="onWorldChange()"><option>loading...</option></select>
  <select id="nodeSelect" onchange="onNodeChange()" style="min-width:100px"><option>auto</option></select>

  <button id="btnPen" class="active" onclick="setTool('pen')" title="画笔">🖊</button>
  <button id="btnFill" onclick="setTool('fill')" title="填充">🪣</button>
  <button id="btnEraser" onclick="setTool('eraser')" title="擦除">🧹</button>
  <button id="btnRiver" onclick="setTool('river')" title="河流 — 点相邻格子拉河段">🌊</button>
  <button id="btnProvince" onclick="setTool('province')" title="省份 — 点击圈边界，点起点闭合">🏛</button>
  <button id="btnGenerate" onclick="generateWorld()" title="生成大陆 — Voronoi+噪声随机地形">🎲</button>

  <span style="color:var(--dim);margin:0 4px;">|</span>
  <span id="terrainButtons" style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;">
    <!-- terrain buttons injected here -->
  </span>

  <span class="spacer"></span>
  <button onclick="saveMap()" title="保存 Ctrl+S">💾 保存</button>
  <button onclick="fitView()" title="适应画面 F">🔍 适应</button>
  <span class="status" id="statusBar">就绪</span>
</div>

<div style="display:flex;flex:1;overflow:hidden;">
<div class="canvas-wrap" id="canvasWrap" style="flex:1;">
  <canvas id="mapCanvas"></canvas>
  <div class="tooltip" id="tooltip"></div>
</div>
<div id="infoPanel" style="width:220px;background:var(--panel);border-left:1px solid var(--border);padding:12px;overflow-y:auto;display:none;font-size:12px;">
  <h4 id="infoTitle" style="color:var(--accent);margin:0 0 8px;"></h4>
  <div id="infoBody"></div>
</div>
</div>

<script src="map-api.js"></script>
<script>
// ── Default Terrain Types (8 standard terrains) ─────────
const DEFAULT_TERRAINS = {
  plains:   {name:"plains",   color:"#6CC261", food:3, gold:1, stone:1, moveCost:1, description:"平原"},
  forest:   {name:"forest",   color:"#228B22", food:2, gold:1, stone:3, moveCost:2, description:"森林"},
  mountain: {name:"mountain", color:"#808080", food:0, gold:2, stone:5, moveCost:3, description:"山地"},
  water:    {name:"water",    color:"#3295D2", food:1, gold:0, stone:0, moveCost:99,description:"水域"},
  desert:   {name:"desert",   color:"#DDC88D", food:0, gold:1, stone:2, moveCost:2, description:"沙漠"},
  swamp:    {name:"swamp",    color:"#556B2F", food:2, gold:0, stone:1, moveCost:3, description:"沼泽"},
  tundra:   {name:"tundra",   color:"#B0C4DE", food:1, gold:0, stone:1, moveCost:2, description:"冻土"},
  hills:    {name:"hills",    color:"#A0522D", food:1, gold:2, stone:3, moveCost:2, description:"丘陵"}
};

// ── State ───────────────────────────────────────────────
let mapData = null;
let terrainTypes = DEFAULT_TERRAINS;   // active terrain palette
let activeTerrain = 'plains';          // currently selected terrain
let tool = 'pen';
let selectedProvince = null;
let provinceLasso = [];
let zoom = 1;
let offX = 0, offY = 0;
let mouseDown = false;
let panStart = null, panOff = null;
let lastHex = null;

const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');
const tooltip = document.getElementById('tooltip');

// ── Hex Math ────────────────────────────────────────────
const GRID = 30;

function hexToPixel(q, r) {
  return {
    x: GRID * (Math.sqrt(3) * q + Math.sqrt(3)/2 * r),
    y: GRID * (3/2 * r)
  };
}
function pixelToHex(x, y) {
  const s = GRID;
  return hexRound((Math.sqrt(3)/3*x - 1/3*y)/s, (2/3*y)/s);
}
function hexRound(fq, fr) {
  const fs = -fq - fr;
  let q = Math.round(fq), r = Math.round(fr), s = Math.round(fs);
  const dq = Math.abs(q-fq), dr = Math.abs(r-fr), ds = Math.abs(s-fs);
  if (dq > dr && dq > ds) q = -r - s;
  else if (dr > ds) r = -q - s;
  return {q, r};
}
function hexCorners(cx, cy, size) {
  const pts = [];
  for (let i=0; i<6; i++) {
    const a = Math.PI/180*(60*i-30);
    pts.push([cx+size*Math.cos(a), cy+size*Math.sin(a)]);
  }
  return pts;
}

// ── Terrain Palette ─────────────────────────────────────
function buildTerrainButtons(types) {
  terrainTypes = types || DEFAULT_TERRAINS;
  const container = document.getElementById('terrainButtons');
  container.innerHTML = '';
  Object.entries(terrainTypes).forEach(([name, t]) => {
    const btn = document.createElement('button');
    btn.className = 'terrain-btn' + (name === activeTerrain ? ' active' : '');
    btn.title = `${name}: ${t.description||''}  🍖${t.food} 💰${t.gold} 🪨${t.stone} 👣${t.moveCost}`;
    btn.onclick = () => selectTerrain(name);
    btn.innerHTML = `<span class="swatch" style="background:${t.color}"></span><span class="label">${name}</span>`;
    container.appendChild(btn);
  });
}

function selectTerrain(name) {
  activeTerrain = name;
  document.querySelectorAll('.terrain-btn').forEach(b => b.classList.remove('active'));
  const btns = document.getElementById('terrainButtons').children;
  for (const b of btns) {
    if (b.querySelector('.label')?.textContent === name) b.classList.add('active');
  }
}

function getTerrainColor(name) {
  return terrainTypes[name]?.color || '#808080';
}


// ── Terrain color resolver (hexKeys-based, no pixel math) ─
function resolveTerrainColor(q, r, cell) {
  const key = q + '_' + r;
  const blocks = (mapData.terrainBlocks || []);
  for (let i = blocks.length - 1; i >= 0; i--) {
    const b = blocks[i];
    if (b._hexSet && b._hexSet.has(key)) {
      return getTerrainColor(b.terrain);
    }
    if (b.hexKeys && Array.isArray(b.hexKeys) && b.hexKeys.includes(key)) {
      return getTerrainColor(b.terrain);
    }
    if (b.boundary && b.boundary.length >= 3) {
      const z = hexToPixel(q, r);
      if (pointInPolygon(z.x, z.y, b.boundary)) {
        return getTerrainColor(b.terrain);
      }
    }
  }
  return (cell && cell.color) || getTerrainColor(cell?.terrain) || '#3295D2';
}

// ── Rendering ───────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(offX, offY);
  ctx.scale(zoom, zoom);

  // Viewport culling: only draw visible hexes
  const invZoom = 1 / zoom;
  const vpLeft   = -offX * invZoom - GRID;
  const vpTop    = -offY * invZoom - GRID;
  const vpRight  = (-offX + canvas.width)  * invZoom + GRID;
  const vpBottom = (-offY + canvas.height) * invZoom + GRID;

  const entries = Object.entries(mapData.hexes || {});
  const hexCount = entries.length;

  if (hexCount === 0 && (!mapData.terrainBlocks || mapData.terrainBlocks.length === 0)) {
    // Empty canvas — draw center crosshair to indicate empty state
    ctx.strokeStyle = '#ffffff22';
    ctx.lineWidth = 1 / zoom;
    // Horizontal line
    ctx.beginPath(); ctx.moveTo(-200, 0); ctx.lineTo(200, 0); ctx.stroke();
    // Vertical line
    ctx.beginPath(); ctx.moveTo(0, -200); ctx.lineTo(0, 200); ctx.stroke();
    // Circle
    ctx.beginPath(); ctx.arc(0, 0, 50, 0, Math.PI * 2); ctx.stroke();
    // Text
    ctx.restore();
    ctx.fillStyle = '#ffffff44';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('空画布 — 右键拖动圈出地形，选地形填充', canvas.width/2, canvas.height/2 + 70);
    return;
  }
  let drawn = 0;

  // Batch by color to reduce fillStyle changes
  const byColor = {};
  for (const [key, cell] of entries) {
    const [q, r] = key.split('_').map(Number);
    const {x, y} = hexToPixel(q, r);
    if (x < vpLeft || x > vpRight || y < vpTop || y > vpBottom) continue;

    const color = resolveTerrainColor(q, r, cell);
    if (!byColor[color]) byColor[color] = [];
    byColor[color].push({x, y});
    drawn++;
  }

  // Also draw hexes covered by terrain blocks that aren't in mapData.hexes\n  const blocks = (mapData.terrainBlocks || []).filter(b => b.boundary && b.boundary.length >= 3);\n  if (blocks.length > 0) {\n    // Expand viewport range in hex coords\n    const tl = pixelToHex(vpLeft, vpTop);\n    const br = pixelToHex(vpRight, vpBottom);\n    for (let q = tl.q - 1; q <= br.q + 1; q++) {\n      for (let r = Math.max(tl.r, br.r) - 1; r <= Math.max(tl.r, br.r) + 1; r++) {\n        const key = q + '_' + r;\n        if (mapData.hexes && mapData.hexes[key]) continue; // already drawn\n        const {x: hx, y: hy} = hexToPixel(q, r);\n        if (hx < vpLeft || hx > vpRight || hy < vpTop*0.866 || hy > vpBottom*0.866) continue;\n        for (let i = blocks.length - 1; i >= 0; i--) {\n          if (pointInPolygon(hx, hy, blocks[i].boundary)) {\n            const color = getTerrainColor(blocks[i].terrain);\n            if (!byColor[color]) byColor[color] = [];\n            byColor[color].push({x: hx, y: hy});\n            drawn++;\n            break;\n          }\n        }\n      }\n    }\n  }

  for (const [color, hexes] of Object.entries(byColor)) {
    ctx.fillStyle = color;
    ctx.strokeStyle = '#ffffff18';
    ctx.lineWidth = 0.5 / zoom;
    ctx.beginPath();
    for (const {x, y} of hexes) {
      const corners = hexCorners(x, y, GRID - 1);
      ctx.moveTo(corners[0][0], corners[0][1]);
      for (let i = 1; i < 6; i++) ctx.lineTo(corners[i][0], corners[i][1]);
    }
    ctx.fill();
    ctx.stroke();
  }

  if (hexCount > 1000) {
    setStatus(`渲染: ${drawn}/${hexCount} hex (${(100*drawn/hexCount)|0}%)`);
  }

  ctx.restore();
  renderRivers();
  renderProvinceHighlight();
}

function resizeCanvas() {
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  render();
}

function fitView() {
  const hexes = mapData?.hexes;
  if (!hexes || Object.keys(hexes).length === 0) {
    zoom = 1; offX = canvas.width/2; offY = canvas.height/2;
    render(); return;
  }
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  Object.keys(hexes).forEach(key => {
    const [q,r] = key.split('_').map(Number);
    const {x,y} = hexToPixel(q,r);
    minX=Math.min(minX,x-GRID); maxX=Math.max(maxX,x+GRID);
    minY=Math.min(minY,y-GRID); maxY=Math.max(maxY,y+GRID);
  });
  const w=maxX-minX, h=maxY-minY;
  zoom = Math.min(canvas.width*0.85/w, canvas.height*0.85/h, 3);
  offX = canvas.width/2 - (minX+maxX)/2*zoom;
  offY = canvas.height/2 - (minY+maxY)/2*zoom;
  render();
}
// ── Tools ───────────────────────────────────────────────
// Terrain lasso tool: draw polygon → pick terrain → fill
let lassoPts = [];          // current lasso polygon
// editorLayers removed — terrainBlocks used directly

function applyTerrainLasso(q, r) {
  // Click start point again → close & fill
  if (lassoPts.length > 2 && q === lassoPts[0].q && r === lassoPts[0].r) {
    finishTerrainLasso();
    return;
  }
  // Auto-connect from last point
  if (lassoPts.length > 0) {
    const last = lassoPts[lassoPts.length - 1];
    const line = hexLine(last.q, last.r, q, r);
    for (let i = 1; i < line.length; i++) lassoPts.push(line[i]);
  } else {
    lassoPts.push({q, r});
  }
  setStatus(`地形套索: ${lassoPts.length} 点 — 点起点闭合`);
  render();
  renderLassoPreview();
}

function finishTerrainLasso() {
  const terrain = activeTerrain;
  const rawKeys = lassoPts.map(p => `${p.q}_${p.r}`);
  lassoPts = [];

  // Send raw lasso keys to backend — backend handles closure + fill
  fetch(`/api/map/${MapAPI.worldId}/blocks`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({terrain, lassoKeys: rawKeys, seedKey: rawKeys[0]})
  }).then(r => r.json()).then(async data => {
    if (data.ok) {
      showToast(`${terrain} 区域已添加`);
      await loadMap();
      render();
    } else {
      showToast('添加失败: ' + (data.reason || 'unknown'));
    }
  }).catch(e => showToast('添加失败: '+e.message));
}
// ── RDP boundary simplification ──
function simplifyBoundary(pts, epsilon) {
  if (pts.length < 4) return pts.slice();
  const result = rdp(pts, 0, pts.length - 1, epsilon);
  return result;
}

function rdp(pts, start, end, eps) {
  let maxDist = 0, maxIdx = start;
  const a = pts[start], b = pts[end];
  for (let i = start + 1; i < end; i++) {
    const d = perpDist(pts[i], a, b);
    if (d > maxDist) { maxDist = d; maxIdx = i; }
  }
  if (maxDist > eps) {
    const left = rdp(pts, start, maxIdx, eps);
    const right = rdp(pts, maxIdx, end, eps);
    left.pop();
    return left.concat(right);
  }
  return [{x:a.x, y:a.y}, {x:b.x, y:b.y}];
}

function perpDist(p, a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  if (Math.abs(dx) < 0.001 && Math.abs(dy) < 0.001)
    return Math.hypot(p.x - a.x, p.y - a.y);
  let t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / (dx * dx + dy * dy);
  t = Math.max(0, Math.min(1, t));
  const px = a.x + t * dx, py = a.y + t * dy;
  return Math.hypot(p.x - px, p.y - py);
}

function renderLassoPreview() {
  ctx.save();
  ctx.translate(offX, offY);
  ctx.scale(zoom, zoom);
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 2 / zoom;
  ctx.setLineDash([4/zoom, 4/zoom]);
  ctx.beginPath();
  for (let i = 0; i < lassoPts.length; i++) {
    const {x, y} = hexToPixel(lassoPts[i].q, lassoPts[i].r);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  if (lassoPts.length > 2) ctx.closePath();
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}


function setTool(t) {
  tool = t;
  document.getElementById('btnPen').classList.toggle('active', t==='pen');
  document.getElementById('btnFill').classList.toggle('active', t==='fill');
  document.getElementById('btnEraser').classList.toggle('active', t==='eraser');
  document.getElementById('btnRiver').classList.toggle('active', t==='river');
  document.getElementById('btnProvince').classList.toggle('active', t==='province');
  riverStart = null;
  provinceLasso = [];
  lassoPts = [];
  if (t === 'province') showProvinceList();
  else { const ip = document.getElementById('infoPanel'); if (ip) ip.style.display = 'none'; }
}

// ── River constants ─────────────────────────────────────
const DIR_VECTORS = [[1,0],[0,1],[-1,1],[-1,0],[0,-1],[1,-1]];
const OPPOSITE_DIR = [3,4,5,0,1,2];
function direction(fromQ, fromR, toQ, toR) {
  const dq = toQ - fromQ, dr = toR - fromR;
  for (let d = 0; d < 6; d++) {
    if (DIR_VECTORS[d][0] === dq && DIR_VECTORS[d][1] === dr) return d;
  }
  return -1;
}

// ── River Tool (manual) ─────────────────────────────────
let riverStart = null;

function addRiverWaypoint(q, r) {
  if (!riverStart) {
    riverStart = {q, r};
    setStatus(`河流起点: (${q},${r}) — 请点击相邻格子，或再次点击此处取消`);
    return;
  }
  // Click start hex again → cancel/exit
  if (q === riverStart.q && r === riverStart.r) {
    riverStart = null;
    setTool('pen');
    setStatus('河流: 已取消');
    return;
  }
  const d = direction(riverStart.q, riverStart.r, q, r);
  // Non-adjacent → exit river mode
  if (d < 0) {
    riverStart = null;
    setTool('pen');
    setStatus('河流: 已结束（非相邻格）');
    return;
  }
  const ak = `${riverStart.q}_${riverStart.r}`, bk = `${q}_${r}`;
  if (!mapData.hexes[ak]) mapData.hexes[ak] = {color:'#6CC261',terrain:'plains',riverMask:0};
  if (!mapData.hexes[bk]) mapData.hexes[bk] = {color:'#6CC261',terrain:'plains',riverMask:0};
  mapData.hexes[ak].riverMask = (mapData.hexes[ak].riverMask || 0) | (1 << d);
  mapData.hexes[bk].riverMask = (mapData.hexes[bk].riverMask || 0) | (1 << OPPOSITE_DIR[d]);
  render();
  showToast(`河流: (${riverStart.q},${riverStart.r}) → (${q},${r})`);
  riverStart = {q, r};
  setStatus(`河流: 从 (${q},${r}) 继续，或点非相邻格/起点结束`);
}

// ── River Rendering ─────────────────────────────────────
function renderRivers() {
  if (!mapData?.hexes) return;
  ctx.save();
  ctx.translate(offX, offY);
  ctx.scale(zoom, zoom);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 5 / zoom;
  ctx.beginPath();
  for (const [key, cell] of Object.entries(mapData.hexes)) {
    const mask = cell.riverMask || 0;
    if (mask === 0) continue;
    const [q, r] = key.split('_').map(Number);
    const {x, y} = hexToPixel(q, r);
    for (let d = 0; d < 6; d++) {
      if (mask & (1 << d)) {
        const [dq, dr] = DIR_VECTORS[d];
        const tx = hexToPixel(q+dq, r+dr).x, ty = hexToPixel(q+dq, r+dr).y;
        const nx = x + (tx - x) * 0.5, ny = y + (ty - y) * 0.5;
        ctx.moveTo(x, y); ctx.lineTo(nx, ny);
      }
    }
  }
  ctx.stroke();

  ctx.strokeStyle = '#3295D2';
  ctx.lineWidth = 3 / zoom;
  ctx.beginPath();
  for (const [key, cell] of Object.entries(mapData.hexes)) {
    const mask = cell.riverMask || 0;
    if (mask === 0) continue;
    const [q, r] = key.split('_').map(Number);
    const {x, y} = hexToPixel(q, r);
    for (let d = 0; d < 6; d++) {
      if (mask & (1 << d)) {
        const [dq, dr] = DIR_VECTORS[d];
        const tx = hexToPixel(q+dq, r+dr).x, ty = hexToPixel(q+dq, r+dr).y;
        const nx = x + (tx - x) * 0.5, ny = y + (ty - y) * 0.5;
        ctx.moveTo(x, y); ctx.lineTo(nx, ny);
      }
    }
  }
  ctx.stroke();
  ctx.restore();
}

// ── World Generator ─────────────────────────────────────
async function generateWorld() {
  if (!confirm('生成新大陆？当前地图将被覆盖。')) return;
  setStatus('🎲 生成大陆中...');
  try {
    const seed = Date.now();
    const r = await fetch(`/api/map/${MapAPI.worldId}/generate?seed=${seed}&ridges=6&fragments=12&land=0.35&roughness=0.5&radius=120`, {method:'POST'});
    const data = await r.json();
    showToast(`大陆已生成: ${data.landHexes} 格陆地 / ${data.hexCount} 格总 (seed:${data.seed})`);
    setStatus(`大陆: ${data.landHexes} 格陆地 | 🍖平原 🌲森林 ⛰山地 ⛰丘陵`);
    await loadMap();
  } catch(e) {
    setStatus('生成失败: ' + e.message);
  }
}

// ── Province Tool ───────────────────────────────────────

function showProvinceList() {
  const panel = document.getElementById('infoPanel');
  const title = document.getElementById('infoTitle');
  const body = document.getElementById('infoBody');
  const provs = mapData?.provinces || {};
  const names = Object.keys(provs);
  const mapTotal = Object.keys(mapData?.hexes || {}).length;

  title.textContent = `🏛 省份 (${names.length})`;
  if (names.length === 0) {
    body.innerHTML = '<div style="color:var(--dim);font-size:11px">点击地图圈边界，再点起点闭合创建省份</div>';
  } else {
    body.innerHTML = names.map(name => {
      const p = provs[name];
      const sel = selectedProvince === name ? 'border:2px solid var(--accent);' : '';
      const ratio = (p.hexes||[]).length / Math.max(mapTotal, 1);
      const warn = ratio > 0.8 ? ' ⚠️过大' : '';
      return `<div style="margin-bottom:6px;padding:6px;background:var(--bg);border-radius:4px;cursor:pointer;${sel}"
        onclick="selectProvince('${name}')">
        <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${p.color||'#888'};margin-right:6px"></span>
        <b>${name}</b> <span style="color:${ratio>0.8?'orange':'var(--dim)'};font-size:10px">${(p.hexes||[]).length}格${warn}</span>
        <button onclick="event.stopPropagation();deleteProvince('${name}')" style="float:right;background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px" title="删除">✕</button>
      </div>`;
    }).join('');
  }
  panel.style.display = 'block';
}

function selectProvince(name) {
  selectedProvince = name;
  showProvinceList();
  render();
  renderProvinceHighlight();
}

function deleteProvince(name) {
  if (confirm(`删除省份「${name}」？`)) {
    delete mapData.provinces[name];
    if (selectedProvince === name) selectedProvince = null;
    showProvinceList();
    render();
  }
}

function renderProvinceHighlight() {
  if (!selectedProvince || !mapData?.provinces) return;
  const p = mapData.provinces[selectedProvince];
  if (!p?.hexes?.length) return;
  ctx.save();
  ctx.translate(offX, offY);
  ctx.scale(zoom, zoom);

  const allHexes = new Set(p.hexes);

  // Semi-transparent fill for entire province
  ctx.fillStyle = (p.color || '#FF0000') + '33';
  for (const key of p.hexes) {
    const [q, r] = key.split('_').map(Number);
    const {x, y} = hexToPixel(q, r);
    const corners = hexCorners(x, y, GRID - 1);
    ctx.beginPath();
    ctx.moveTo(corners[0][0], corners[0][1]);
    for (let i = 1; i < 6; i++) ctx.lineTo(corners[i][0], corners[i][1]);
    ctx.closePath();
    ctx.fill();
  }

  // Filled dots at boundary hexes (province hexes touching non-province)
  const boundaryHexes = [];
  for (const key of p.hexes) {
    const [q, r] = key.split('_').map(Number);
    for (const [dq, dr] of DIR_VECTORS) {
      if (!allHexes.has(`${q+dq}_${r+dr}`)) { boundaryHexes.push({q, r}); break; }
    }
  }

  ctx.fillStyle = p.color || '#FF0000';
  for (const {q, r} of boundaryHexes) {
    const {x, y} = hexToPixel(q, r);
    ctx.beginPath();
    ctx.arc(x, y, 4 / zoom, 0, Math.PI * 2);
    ctx.fill();
  }

  canvas._boundaryHexes = boundaryHexes;
  ctx.restore();
}

// ── Province boundary dragging ──────────────────────────
let dragPoint = null;




canvas.addEventListener('mousedown', e => {
  // Right click: paint or province lasso
  if (e.button === 2) {
    e.preventDefault();
    if (tool === 'province') {
      provinceLasso = [];
      const h = getHexAtEvent(e);
      if (h) addProvincePoint(h.q, h.r);
      return;
    }
    mouseDown = true;
    clickHex = getHexAtEvent(e);
    if (clickHex) applyTool(clickHex.q, clickHex.r);
    return;
  }
  // Left click: pan or province boundary drag
  if (e.button === 0) {
    if (tool === 'province' && selectedProvince && canvas._boundaryHexes) {
      const rc = canvas.getBoundingClientRect();
      const mx = (e.clientX - rc.left - offX) / zoom;
      const my = (e.clientY - rc.top - offY) / zoom;
      for (const bp of canvas._boundaryHexes) {
        const {x:bx, y:by} = hexToPixel(bp.q, bp.r);
        if (Math.hypot(mx-bx, my-by) < 8/zoom) { dragPoint = bp; return; }
      }
    }
    panStart = {x: e.clientX, y: e.clientY}; panOff = {x: offX, y: offY};
    mouseDown = true;
    clickHex = getHexAtEvent(e);
  }
});


canvas.addEventListener('contextmenu', e => e.preventDefault()); // disable browser menu

canvas.addEventListener('mousemove', e => {
  if (panStart) {
    offX = panOff.x + (e.clientX - panStart.x);
    offY = panOff.y + (e.clientY - panStart.y);
    if (Math.abs(e.clientX - panStart.x) > 3 || Math.abs(e.clientY - panStart.y) > 3) clickHex = null;
    render(); return;
  }

  if (tool === 'province' && provinceLasso.length > 0) {
    const h = getHexAtEvent(e);
    if (h) addProvincePoint(h.q, h.r);
    return;
  }

  if (dragPoint) {
    const h = getHexAtEvent(e);
    if (h && (h.q !== dragPoint.q || h.r !== dragPoint.r)) {
      const newKey = `${h.q}_${h.r}`;
      const oldKey = `${dragPoint.q}_${dragPoint.r}`;
      const p = mapData.provinces[selectedProvince];
      if (p?.hexes) {
        if (!p.hexes.includes(newKey) && mapData.hexes[newKey]) p.hexes.push(newKey);
        else if (p.hexes.includes(newKey) && newKey !== oldKey) p.hexes = p.hexes.filter(k => k !== oldKey);
        dragPoint = {q: h.q, r: h.r};
        render();
      }
    }
    return;
  }

  const h = getHexAtEvent(e);
  if (h) {
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 15) + 'px';
    tooltip.style.top = (e.clientY - 20) + 'px';
    const cell = (mapData?.hexes || {})[`${h.q}_${h.r}`];
    const tn = cell?.terrain || 'empty';
    const tt = terrainTypes[tn];
    tooltip.textContent = `(${h.q},${h.r}) ${tn}` + (tt ? ` 🍖${tt.food} 💰${tt.gold} 🪨${tt.stone}` : '');
  } else tooltip.style.display = 'none';
});

canvas.addEventListener('mouseup', e => {
  // Province lasso finish
  if (tool === 'province' && provinceLasso.length > 2) {
    finishProvinceLasso();
    provinceLasso = [];
    return;
  }
  provinceLasso = [];
  if (dragPoint) { dragPoint = null; render(); return; }
  if (clickHex && tool === 'river') {
    addRiverWaypoint(clickHex.q, clickHex.r);
  } else if (clickHex && tool === 'province') {
    addProvincePoint(clickHex.q, clickHex.r);
  } else if (clickHex && mouseDown) {
    showHexInfo(clickHex.q, clickHex.r);
  }
  mouseDown = false; panStart = null; clickHex = null;
});

canvas.addEventListener('mouseleave', ()=>{mouseDown=false;panStart=null;tooltip.style.display='none';});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zf = e.deltaY < 0 ? 1.1 : 1/1.1;
  const nz = Math.max(0.1, Math.min(5, zoom * zf));
  const r = canvas.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  offX = mx - (mx - offX) * nz / zoom;
  offY = my - (my - offY) * nz / zoom;
  zoom = nz;
  render();
}, {passive: false});

function getHexAtEvent(e) {
  const r = canvas.getBoundingClientRect();
  return pixelToHex((e.clientX-r.left-offX)/zoom, (e.clientY-r.top-offY)/zoom);
}

// ── Info Panel ──────────────────────────────────────────
function showHexInfo(q, r) {
  const key = `${q}_${r}`;
  const cell = (mapData?.hexes || {})[key];
  const panel = document.getElementById('infoPanel');
  const title = document.getElementById('infoTitle');
  const body = document.getElementById('infoBody');

  if (!cell) { panel.style.display = 'none'; return; }

  // Find province this hex belongs to
  let provName = '', provTag = '', provDesc = '';
  for (const [pname, prov] of Object.entries(mapData.provinces || {})) {
    if (prov.hexes?.includes(key)) { provName = pname; provTag = prov.tag || ''; provDesc = prov.description || ''; break; }
  }

  const tt = terrainTypes[cell.terrain] || {};
  title.textContent = `(${q}, ${r}) — ${cell.terrain}`;
  body.innerHTML = `
    <div style="margin-bottom:8px">
      <label style="color:var(--dim);font-size:10px">描述</label>
      <textarea id="hexDesc" style="width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px;font-size:11px;resize:vertical;min-height:40px"
        onchange="updateHexDesc(${q},${r},this.value)">${cell.description||''}</textarea>
    </div>
    ${provName ? `
    <div style="margin-bottom:8px;padding:8px;background:var(--bg);border-radius:4px">
      <div style="font-weight:700;color:var(--accent);margin-bottom:4px">${provName}</div>
      <label style="color:var(--dim);font-size:10px">GSim Tag</label>
      <input id="provTag" style="width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 4px;font-size:11px"
        value="${provTag}" onchange="updateProvTag('${provName}',this.value)">
      <label style="color:var(--dim);font-size:10px;margin-top:4px;display:block">省份描述</label>
      <textarea id="provDesc" style="width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px;font-size:11px;resize:vertical;min-height:30px"
        onchange="updateProvDesc('${provName}',this.value)">${provDesc}</textarea>
    </div>` : ''}
    <div style="font-size:10px;color:var(--dim)">
      🍖${tt.food||0} 💰${tt.gold||0} 🪨${tt.stone||0} 👣${tt.moveCost||0}
    </div>`;
  panel.style.display = 'block';
}

function updateHexDesc(q, r, val) {
  const key = `${q}_${r}`;
  if (!mapData.hexes[key]) mapData.hexes[key] = {color:'#808080',terrain:'unknown'};
  mapData.hexes[key].description = val;
}

function updateProvTag(name, val) {
  if (mapData.provinces[name]) mapData.provinces[name].tag = val;
}

function updateProvDesc(name, val) {
  if (mapData.provinces[name]) mapData.provinces[name].description = val;
}

// ── Province Lasso ──────────────────────────────────────

// Bresenham-style hex line between two axial coordinates
function hexLine(aq, ar, bq, br) {
  const dist = (Math.abs(aq - bq) + Math.abs(ar - br) + Math.abs(-aq-ar + bq+br)) / 2;
  if (dist === 0) return [{q: aq, r: ar}];
  const pts = [];
  for (let i = 0; i <= dist; i++) {
    const t = i / dist;
    const fq = aq + (bq - aq) * t, fr = ar + (br - ar) * t;
    let q = Math.round(fq), r = Math.round(fr);
    const dq = Math.abs(fq - q), dr = Math.abs(fr - r), ds = Math.abs(-fq-fr - (-q-r));
    if (dq > dr && dq > ds) q = -r - (-q-r);
    else if (dr > ds) r = -q - (-q-r);
    pts.push({q, r});
  }
  return pts;
}

function addProvincePoint(q, r) {
  if (provinceLasso.length > 0) {
    const last = provinceLasso[provinceLasso.length - 1];
    if (last.q === q && last.r === r) return;
    const line = hexLine(last.q, last.r, q, r);
    for (let i = 1; i < line.length; i++) provinceLasso.push(line[i]);
  } else { provinceLasso.push({q, r}); }
  renderProvincePreview();
}

function renderProvincePreview() {
  if (provinceLasso.length < 2) return;
  ctx.save(); ctx.translate(offX, offY); ctx.scale(zoom, zoom);
  ctx.strokeStyle = '#ff00ff'; ctx.lineWidth = 2/zoom;
  ctx.beginPath();
  for (const p of provinceLasso) { const {x,y}=hexToPixel(p.q,p.r); ctx.lineTo(x,y); }
  ctx.closePath(); ctx.stroke(); ctx.restore();
}

function finishProvinceLasso() {
  if (provinceLasso.length < 3) { provinceLasso=[]; render(); return; }
  const boundSet = new Set(provinceLasso.map(p => p.q+'_'+p.r));
  let sq=0,sr=0; for (const k of boundSet) { const [q,r]=k.split('_').map(Number); sq+=q; sr+=r; }
  const cq=Math.round(sq/boundSet.size), cr=Math.round(sr/boundSet.size);
  let seed = null;
  for (let r=0; r<200 && !seed; r++) {
    if (r===0) { const k=cq+'_'+cr; if(!boundSet.has(k)&&mapData.hexes[k]){seed={q:cq,r:cr};break;} continue; }
    let qq=cq+r*DIR_VECTORS[4][0], rr=cr+r*DIR_VECTORS[4][1];
    for (let d=0;d<6&&!seed;d++) for (let s=0;s<r;s++) {
      const k=qq+'_'+rr; if(!boundSet.has(k)&&mapData.hexes[k]){seed={q:qq,r:rr};break;}
      qq+=DIR_VECTORS[d][0]; rr+=DIR_VECTORS[d][1];
    }
  }
  if (!seed) { provinceLasso=[]; render(); return; }
  const interior=new Set(), queue=[seed], visited=new Set();
  while (queue.length) {
    const {q,r}=queue.pop(), k=q+'_'+r;
    if(visited.has(k))continue; visited.add(k); interior.add(k);
    for (const [dq,dr] of DIR_VECTORS) {
      const nk=(q+dq)+'_'+(r+dr);
      if(!boundSet.has(nk)&&!visited.has(nk)&&mapData.hexes[nk]) queue.push({q:q+dq,r:r+dr});
    }
  }
  const name = prompt('省份名称:', '省'+(Object.keys(mapData.provinces||{}).length+1));
  if (!name) { provinceLasso=[]; render(); return; }
  if (!mapData.provinces) mapData.provinces = {};
  mapData.provinces[name] = {hexes:[...interior,...boundSet], color:'#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'), tag:'',description:''};
  provinceLasso=[]; selectedProvince=name; showProvinceList(); render();
}

function computeBoundaryHexes(provinceName) {
  const p = mapData?.provinces?.[provinceName];
  if (!p?.hexes) return [];
  const hs = new Set(p.hexes), bnd = [];
  for (const key of p.hexes) {
    const [q,r]=key.split('_').map(Number);
    for (const [dq,dr] of DIR_VECTORS) if(!hs.has((q+dq)+'_'+(r+dr))){bnd.push({q,r,key});break;}
  }
  return bnd;
}

// ── API ─────────────────────────────────────────────────
async function init() {
  try { MapAPI.init(); } catch(e) { console.warn(e); }
  if (!MapAPI.worldId || MapAPI.worldId === 'default') MapAPI.worldId = 'logdemo';

  // Build terrain buttons and canvas immediately
  try { buildTerrainButtons(DEFAULT_TERRAINS); } catch(e) {}
  window.addEventListener('resize', resizeCanvas);
  try { resizeCanvas(); } catch(e) {}

  // Start with empty canvas (don't wait for fetch)
  mapData = {hexes:{}, terrainBlocks:[], provinces:{}, cities:{}, terrainTypes:{...DEFAULT_TERRAINS}, gridSize:80, hexOrientation:false, rivers:[], roads:[]};
  setStatus('空画布就绪 — 右键拖动圈地形');

  // Populate world selector with known fallback
  document.getElementById('worldSelect').innerHTML = '<option value="logdemo">logdemo</option>';

  // Try loading worlds in background
  try {
    const r = await fetch('/api/map');
    if (r.ok) {
      const data = await r.json();
      const worlds = data.worlds || [];
      if (worlds.length > 0) {
        const sel = document.getElementById('worldSelect');
        sel.innerHTML = worlds.map(w => '<option value="'+w+'">'+w+'</option>').join('');
        sel.value = worlds.includes(MapAPI.worldId) ? MapAPI.worldId : worlds[0];
        MapAPI.worldId = sel.value;
      }
    }
    await loadNodes();
    await loadMap();
  } catch(e) {
    console.warn('Background load failed, using empty canvas:', e);
    try { fitView(); } catch(e2) {}
  }
}

async function onWorldChange() {
  MapAPI.worldId = document.getElementById('worldSelect').value;
  MapAPI.nodeId = null;
  await loadNodes();
  await loadMap();
}

async function loadNodes() {
  try {
    const r = await fetch(`/api/map/${MapAPI.worldId}/nodes`);
    const data = await r.json();
    const sel = document.getElementById('nodeSelect');
    const savedNodeId = localStorage.getItem('goatmosire_nodeId') || '';
    sel.innerHTML = '<option value="">auto (活跃节点)</option>';
    (data.nodes||[]).forEach(n => {
      const marker = n.hasMap ? ' 🗺' : '';
      sel.innerHTML += `<option value="${n.nodeId}">${n.nodeId} (T${n.turn})${marker}</option>`;
    });
    // Restore saved node selection
    if (savedNodeId) {
      sel.value = savedNodeId;
      MapAPI.nodeId = savedNodeId;
    }
  } catch(e) { console.warn('Failed to load nodes:', e); }
}

function onNodeChange() {
  MapAPI.nodeId = document.getElementById('nodeSelect').value || null;
  localStorage.setItem('goatmosire_nodeId', MapAPI.nodeId || '');
  mapData = null;
  loadMap();
}

async function loadMap() {
  try {
    mapData = await MapAPI.load();
    if (mapData.terrainTypes && Object.keys(mapData.terrainTypes).length > 0) {
      buildTerrainButtons(mapData.terrainTypes);
    } else {
      mapData.terrainTypes = {...DEFAULT_TERRAINS};
    }
    if (!mapData.terrainBlocks) mapData.terrainBlocks = [];
    if (!mapData.hexes) mapData.hexes = {};
    // Convert hexKeys arrays to Sets for O(1) lookup
    for (const b of mapData.terrainBlocks) {
      if (b.hexKeys && Array.isArray(b.hexKeys)) {
        b._hexSet = new Set(b.hexKeys);
      }
    }
    setStatus(`已加载: ${MapAPI.worldId} (${mapData.terrainBlocks.length} 地形块)`);
  } catch(e) {
    // Create empty map
    mapData = {hexes:{}, terrainBlocks:[], provinces:{}, cities:{}, terrainTypes:{...DEFAULT_TERRAINS}, gridSize:120, hexOrientation:false, rivers:[], roads:[]};
    buildTerrainButtons(DEFAULT_TERRAINS);
    setStatus('空画布 — 点 🎲 生成新大陆');
  }
  render();
}

async function saveMap() {
  if (!mapData) return;
  if (!mapData.terrainTypes || Object.keys(mapData.terrainTypes).length === 0) {
    mapData.terrainTypes = {...DEFAULT_TERRAINS};
  }
  try {
    await MapAPI.save(mapData);
    showToast('已保存');
    setStatus('已保存');
  } catch(e) { showToast('保存失败: '+e.message); }
}

function setStatus(msg) { document.getElementById('statusBar').textContent = msg; }

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key==='s') { e.preventDefault(); saveMap(); }
  if (e.key==='f' && !e.ctrlKey) { fitView(); }
  if (e.key==='p' && !e.ctrlKey) setTool('pen');
  if (e.key==='e' && !e.ctrlKey) setTool('eraser');
});

init();
</script>
